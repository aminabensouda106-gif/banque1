<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="632px" preserveAspectRatio="none" style="width:480px;height:632px;background:#FFFFFF;" version="1.1" viewBox="0 0 480 632" width="480px" zoomAndPan="magnify"><title>Activit&#233; &#8212; Effectuer un virement</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="216.7129" x="130.2515" y="34.5332">Activit&#233; &#8212; Effectuer un virement</text><ellipse cx="195.4121" cy="58.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><path d="M305.7939,78.6094 L305.7939,109.7969 L285.7939,113.7969 L305.7939,117.7969 L305.7939,148.9844 A0,0 0 0 0 305.7939,148.9844 L468.2158,148.9844 A0,0 0 0 0 468.2158,148.9844 L468.2158,88.6094 L458.2158,78.6094 L305.7939,78.6094 A0,0 0 0 0 305.7939,78.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M458.2158,78.6094 L458.2158,88.6094 L468.2158,88.6094 L458.2158,78.6094 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="79.3594" x="311.7939" y="96.0664">Cas de refus :</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="108.0586" x="311.7939" y="111.1602">compte introuvable ;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="141.4219" x="311.7939" y="126.2539">compte bloqu&#233; ou cl&#244;tur&#233; ;</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="86.0508" x="311.7939" y="141.3477">solde insuffisant</text><rect fill="#F1F1F1" height="50.1875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="180.7637" x="105.0303" y="88.7031"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.4043" x="115.0303" y="111.1602">Agent saisit compte source,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7637" x="115.0303" y="126.2539">compte destination et montant</text><rect fill="#F1F1F1" height="50.1875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="186.7402" x="102.042" y="168.9844"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="166.7402" x="112.042" y="191.4414">V&#233;rifier existence des comptes,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7402" x="112.042" y="206.5352">statut ACTIVE et solde source</text><polygon fill="#F1F1F1" points="146.7236,239.1719,244.1006,239.1719,256.1006,254.2656,244.1006,269.3594,146.7236,269.3594,134.7236,254.2656,146.7236,239.1719" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="97.377" x="146.7236" y="251.6289">Tous les contr&#244;les</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="73.377" x="146.7236" y="266.7227">sont valides ?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14.6792" x="120.0444" y="251.8486">oui</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="18.353" x="256.1006" y="251.8486">non</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="153.3945" x="24.0107" y="279.3594"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.3945" x="34.0107" y="301.8164">D&#233;biter le compte source</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="179.416" x="11" y="349.4531"/><text fill="#000000" font-