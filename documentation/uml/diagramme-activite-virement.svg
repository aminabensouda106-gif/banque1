<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="714px" preserveAspectRatio="none" style="width:845px;height:714px;background:#FFFFFF;" version="1.1" viewBox="0 0 845 714" width="845px" zoomAndPan="magnify"><title>Activit&#233; &#8212; Effectuer un virement</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="216.7129" x="312.9775" y="34.5332">Activit&#233; &#8212; Effectuer un virement</text><ellipse cx="549.8445" cy="58.6094" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F1F1F1" height="50.1875" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="180.7637" x="459.4626" y="88.6094"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="147.4043" x="469.4626" y="111.0664">Agent saisit compte source,</text><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="160.7637" x="469.4626" y="126.1602">compte destination et montant</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="222.7695" x="438.4597" y="158.7969"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="202.7695" x="448.4597" y="181.2539">V&#233;rifier que les deux comptes existent</text><polygon fill="#F1F1F1" points="503.6853,213.8906,596.0037,213.8906,608.0037,225.8906,596.0037,237.8906,503.6853,237.8906,491.6853,225.8906,503.6853,213.8906" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="92.3184" x="503.6853" y="230.3916">Comptes trouv&#233;s ?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14.6792" x="477.0061" y="223.4736">oui</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="18.353" x="608.0037" y="223.4736">non</text><polygon fill="#F1F1F1" points="273.5188,247.8906,438.5994,247.8906,450.5994,259.8906,438.5994,271.8906,273.5188,271.8906,261.5188,259.8906,273.5188,247.8906" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="165.0806" x="273.5188" y="264.3916">Les deux comptes sont ACTIVE ?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14.6792" x="246.8396" y="257.4736">oui</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="18.353" x="450.5994" y="257.4736">non</text><polygon fill="#F1F1F1" points="131.2031,281.8906,263.2891,281.8906,275.2891,293.8906,263.2891,305.8906,131.2031,305.8906,119.2031,293.8906,131.2031,281.8906" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="132.0859" x="131.2031" y="298.3916">Solde source &gt;= montant ?</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="14.6792" x="104.5239" y="291.4736">oui</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="18.353" x="275.2891" y="291.4736">non</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="153.3945" x="24.0107" y="315.8906"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.3945" x="34.0107" y="338.3477">D&#233;biter le compte source</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="179.416" x="11" y="370.9844"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="159.416" x="21" y="393.4414">Cr&#233;diter le compte destination</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="153.3945" x="24.0107" y="426.0781"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="133.3945" x="34.0107" y="448.5352">Enregistrer la transaction</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="142.3613" x="29.5273" y="481.1719"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="122.3613" x="39.5273" y="503.6289">Journaliser dans l'audit</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="129.377" x="36.0195" y="536.2656"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="109.377" x="46.0195" y="558.7227">Afficher confirmation</text><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="166.7363" x="210.416" y="315.8906"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="146.7363" x="220.416" y="338.3477">Refuser &#8212; solde insuffisant</text><polygon fill="#F1F1F1" points="197.2461,577.3594,209.2461,589.3594,197.2461,601.3594,185.2461,589.3594,197.2461,577.3594" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="215.4395" x="407.1523" y="281.8906"/><text fill="#000000" font-family="sans-serif" font-size="12" lengthAdjust="spacing" textLength="195.4395" x="417.1523" y="304.3477">Refuser &#8212; compte bloqu&#233; ou cl&#244;tur&#233;</text><polygon fill="#F1F1F1" points="356.0591,607.3594,368.0591,619.3594,356.0591,631.3594,344.0591,619.3594,356.0591,607.3594" style="stroke:#181818;stroke-width:0.5;"/><rect fill="#F1F1F1" height="35.0938" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width