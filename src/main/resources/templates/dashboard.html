<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card">
        <h2 th:text="'Bienvenue, ' + ${fullName} + ' !'">Bienvenue</h2>
        <p class="text-muted mb-0">
            Vous êtes connecté en tant que
            <strong th:text="${roleLabel}">Rôle</strong>.
        </p>
    </div>
    <div class="row g-3 mt-2">
        <div class="col-md-4">
            <div class="stat-card">
                <h3>Clients</h3>
                <p class="text-muted"><a th:href="@{/clients}">Gérer les clients</a></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <h3>Comptes</h3>
                <p class="text-muted"><a th:href="@{/accounts}">Gérer les comptes</a></p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <h3>Opérations</h3>
                <p class="text-muted">Module disponible en Phase 6</p>
            </div>
        </div>
    </div>
</section>
</body>
</html>
