<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card">
        <p class="text-muted">Comptes courants ou professionnels actifs, sans commande en attente.</p>
        <form th:action="@{/checkbook-orders}" th:object="${checkbookOrderForm}" method="post">
            <div class="mb-3">
                <label for="accountId" class="form-label">Compte *</label>
                <select id="accountId" class="form-select" th:field="*{accountId}"
                        th:classappend="${#fields.hasErrors('accountId')} ? ' is-invalid'">
                    <option value="">— Choisir un compte —</option>
                    <option th:each="a : ${eligibleAccounts}" th:value="${a.id}"
                            th:text="${a.accountNumber + ' — ' + a.client.fullName + ' (' + a.type.label + ')'}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{accountId}"></div>
                <div th:if="${eligibleAccounts.isEmpty()}" class="form-text text-warning">
                    Aucun compte éligible (compte actif courant/pro sans demande en attente).
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Format du chéquier *</label>
                <div th:each="opt : ${sheetCountOptions}" class="form-check">
                    <input class="form-check-input" type="radio" th:field="*{sheetCount}"
                           th:id="${'sheetCount_' + opt.name()}" th:value="${opt.name()}">
                    <label class="form-check-label" th:for="${'sheetCount_' + opt.name()}"
                           th:text="${opt.label}">20 feuillets</label>
                </div>
                <div class="invalid-feedback d-block" th:errors="*{sheetCount}"></div>
            </div>
            <div class="mb-3">
                <label for="quantity" class="form-label">Nombre de chéquiers *</label>
                <input type="number" id="quantity" class="form-control" th:field="*{quantity}" min="1" max="10"
                       th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid'">
                <div class="invalid-feedback" th:errors="*{quantity}"></div>
            </div>
            <div class="mb-3">
                <label for="notes" class="form-label">Notes</label>
                <input type="text" id="notes" class="form-control" th:field="*{notes}" maxlength="255">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" th:text="${submitLabel}"
                        th:disabled="${eligibleAccounts.isEmpty()}">Valider</button>
                <a th:href="@{/checkbook-orders}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
