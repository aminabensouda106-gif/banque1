<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Reçu n°' + ${transaction.id} + ' — AmanaBank'">Reçu</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="receipt-body">
<nav th:replace="~{fragments/ui :: back(${backUrl}, 'Historique')}"></nav>
<div class="receipt-container">
    <header class="receipt-header text-center mb-4">
        <img th:src="@{/images/amana-logo.png}" src="/images/amana-logo.png"
             alt="AmanaBank" class="brand-logo">
        <p class="text-muted mb-0">Reçu d'opération</p>
    </header>

    <dl class="row receipt-details">
        <dt class="col-sm-4">N° opération</dt>
        <dd class="col-sm-8" th:text="${transaction.id}">1</dd>

        <dt class="col-sm-4">Date</dt>
        <dd class="col-sm-8" th:text="${#temporals.format(transaction.executedAt, 'dd/MM/yyyy HH:mm')}">—</dd>

        <dt class="col-sm-4">Type</dt>
        <dd class="col-sm-8" th:text="${transaction.type.label}">Type</dd>

        <dt class="col-sm-4">Montant</dt>
        <dd class="col-sm-8">
            <strong th:text="${#numbers.formatDecimal(transaction.amount, 1, 2)} + ' MAD'">0,00 MAD</strong>
        </dd>

        <dt class="col-sm-4" th:if="${transaction.sourceAccount != null}">Compte débité</dt>
        <dd class="col-sm-8" th:if="${transaction.sourceAccount != null}"
            th:text="${transaction.sourceAccount.accountNumber}">—</dd>

        <dt class="col-sm-4" th:if="${billPayment != null}">Facturier</dt>
        <dd class="col-sm-8" th:if="${billPayment != null}"
            th:text="${billPayment.billProvider.name}">—</dd>

        <dt class="col-sm-4" th:if="${billPayment != null}">Référence</dt>
        <dd class="col-sm-8" th:if="${billPayment != null}"
            th:text="${billPayment.clientReference}">—</dd>

        <dt class="col-sm-4" th:if="${transaction.destinationAccount != null}">Compte destination</dt>
        <dd class="col-sm-8" th:if="${transaction.destinationAccount != null}"
            th:text="${transaction.destinationAccount.accountNumber}">—</dd>

        <dt class="col-sm-4">Agent</dt>
        <dd class="col-sm-8" th:text="${transaction.executedBy.fullName}">Agent</dd>

        <dt class="col-sm-4" th:if="${transaction.description != null and !transaction.description.isEmpty()}">Description</dt>
        <dd class="col-sm-8" th:if="${transaction.description != null and !transaction.description.isEmpty()}"
            th:text="${transaction.description}">—</dd>
    </dl>

    <p class="text-muted small text-center mt-4 mb-0">
        Document généré le <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}">—</span>
    </p>

    <div th:if="${successMessage}" class="alert alert-success text-center no-print mt-3 mb-0" th:text="${successMessage}"></div>

    <div class="receipt-actions no-print mt-4 d-flex gap-2 justify-content-center flex-wrap">
        <a th:href="${pdfUrl}" class="btn btn-success btn-with-icon" th:download="${receiptFileName}">
            <i class="bi bi-file-earmark-pdf" aria-hidden="true"></i> Télécharger PDF
        </a>
        <button type="button" class="btn btn-primary btn-with-icon" onclick="window.print()">
            <i class="bi bi-printer" aria-hidden="true"></i> Imprimer
        </button>
        <a th:href="${backUrl}" class="btn btn-outline-secondary btn-with-icon">
            <i class="bi bi-clock-history" aria-hidden="true"></i> Historique
        </a>
    </div>
</div>
</body>
</html>
