<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — AmanaBank'">Espace client</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body portal-body">
<div class="app-shell">
    <aside class="sidebar portal-sidebar">
        <div class="sidebar-brand">
            <a th:href="@{/}" class="brand-logo-wrap" title="AmanaBank">
                <img th:src="@{/images/amana-logo.png}" src="/images/amana-logo.png"
                     alt="AmanaBank" class="brand-logo" width="140" height="26">
            </a>
            <span class="sidebar-brand-tag">Espace client</span>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/portal/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? ' active'">
                <i class="bi bi-speedometer2" aria-hidden="true"></i>
                <span>Tableau de bord</span>
            </a>
            <a th:href="@{/portal/accounts}" class="sidebar-link" th:classappend="${activePage == 'accounts'} ? ' active'">
                <i class="bi bi-wallet2" aria-hidden="true"></i>
                <span>Mes comptes</span>
            </a>
            <a th:href="@{/portal/transactions}" class="sidebar-link" th:classappend="${activePage == 'transactions'} ? ' active'">
                <i class="bi bi-clock-history" aria-hidden="true"></i>
                <span>Historique</span>
            </a>
            <a th:href="@{/portal/checkbook-orders}" class="sidebar-link" th:classappend="${activePage == 'checkbook-orders'} ? ' active'">
                <i class="bi bi-journal-check" aria-hidden="true"></i>
                <span>Chéquiers</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="bi bi-person-circle sidebar-user-icon" aria-hidden="true"></i>
                <div>
                    <strong sec:authentication="principal.client.fullName">Client</strong>
                    <small>
                        Client bancaire<br>
                        <span sec:authentication="principal.client.clientNumber">N° client</span>
                        · <span sec:authentication="principal.client.cin">CIN</span>
                    </small>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    Déconnexion
                </button>
            </form>
        </div>
    </aside>
    <div class="app-main">
        <header class="app-header d-flex justify-content-between align-items-center">
            <h1 th:text="${title}">Page</h1>
            <a th:href="@{/portal/notifications}" class="notification-bell" title="Notifications"
               th:classappend="${activePage == 'notifications'} ? ' notification-bell-active' : ''">
                <i class="bi bi-bell" aria-hidden="true"></i>
                <span th:if="${unreadNotificationCount > 0}" class="notification-badge"
                      th:text="${unreadNotificationCount > 9} ? '9+' : ${unreadNotificationCount}">0</span>
            </a>
        </header>
        <main class="app-content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:replace="${content}">Contenu</div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
