<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{portal/layout :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card">
        <h2 th:text="'Bonjour, ' + ${client.firstName} + ' !'">Bonjour</h2>
        <p class="text-muted mb-0">
            Consultez vos comptes, opérations et notifications en temps réel.
        </p>
    </div>

    <div th:if="${unreadNotifications > 0 or pendingCheckbooks > 0}" class="alert-alerts mt-3">
        <h3 class="h6 mb-2">À votre attention</h3>
        <div class="d-flex flex-wrap gap-2">
            <a th:if="${unreadNotifications > 0}" th:href="@{/portal/notifications}"
               class="alert alert-primary mb-0 py-2 px-3 text-decoration-none">
                <strong th:text="${unreadNotifications}">0</strong> notification(s) non lue(s)
            </a>
            <a th:if="${pendingCheckbooks > 0}" th:href="@{/portal/checkbook-orders}"
               class="alert alert-info mb-0 py-2 px-3 text-decoration-none">
                <strong th:text="${pendingCheckbooks}">0</strong> commande(s) de chéquier en cours
            </a>
        </div>
    </div>

    <div class="row g-3 mt-2">
        <div class="col-md-4" th:each="account : ${accounts}">
            <div class="stat-card">
                <h3 th:text="${account.type.label}">Type</h3>
                <p class="stat-value"
                   th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' MAD'">0,00 MAD</p>
                <p class="text-muted mb-0" th:text="${account.accountNumber}">ACC-00001</p>
                <p class="mb-0 mt-1">
                    <span class="badge" th:classappend="${account.status.name() == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'"
                          th:text="${account.status.label}">Actif</span>
                </p>
            </div>
        </div>
    </div>

    <div class="welcome-card mt-3">
        <h3 class="h5">5 dernières opérations</h3>
        <div th:if="${recentTransactions.isEmpty()}" class="text-muted">Aucune opération.</div>
        <div th:unless="${recentTransactions.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Montant</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tx : ${recentTransactions}">
                    <td th:text="${#temporals.format(tx.executedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                    <td th:text="${tx.type.label}">Type</td>
                    <td th:text="${#numbers.formatDecimal(tx.amount, 1, 2)} + ' MAD'">0,00</td>
                    <td>
                        <a th:href="@{/portal/transactions/{id}/receipt(id=${tx.id})}" class="btn btn-sm btn-outline-secondary">Reçu</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <p class="mb-0 mt-2"><a th:href="@{/portal/transactions}">Voir tout l'historique</a></p>
    </div>
</section>
</body>
</html>
