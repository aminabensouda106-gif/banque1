<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <nav th:replace="~{fragments/ui :: back(@{/accounts}, 'Comptes')}"></nav>
    <div class="welcome-card mb-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
            <div>
                <h2 class="h4 mb-1" th:text="${account.accountNumber}">ACC-00001</h2>
                <p class="text-muted mb-0">
                    <span th:text="${account.type.label}">Compte courant</span>
                    · Client :
                    <a th:href="@{/clients/{id}(id=${account.client.id})}"
                       th:text="${account.client.fullName}">Client</a>
                </p>
            </div>
            <span class="badge fs-6"
                  th:classappend="' text-bg-' + ${account.status.badgeClass}"
                  th:text="${account.status.label}">Actif</span>
        </div>

        <dl class="row mb-0">
            <dt class="col-sm-3">Solde</dt>
            <dd class="col-sm-9">
                <strong th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' MAD'">0,00 MAD</strong>
            </dd>
            <dt class="col-sm-3">N° client</dt>
            <dd class="col-sm-9" th:text="${account.client.clientNumber}">CLI-00001</dd>
            <dt class="col-sm-3">Ouvert le</dt>
            <dd class="col-sm-9" th:text="${#temporals.format(account.openedAt, 'dd/MM/yyyy HH:mm')}">—</dd>
            <dt class="col-sm-3">Clôturé le</dt>
            <dd class="col-sm-9"
                th:text="${account.closedAt != null ? #temporals.format(account.closedAt, 'dd/MM/yyyy HH:mm') : '—'}">—</dd>
        </dl>
    </div>

    <div class="d-flex flex-wrap gap-2 action-toolbar">
        <a th:href="@{/clients/{id}(id=${account.client.id})}" class="btn btn-outline-secondary btn-with-icon">
            <i class="bi bi-person" aria-hidden="true"></i> Fiche client
        </a>
        <a th:href="@{/accounts}" class="btn btn-outline-secondary btn-with-icon">
            <i class="bi bi-list-ul" aria-hidden="true"></i> Tous les comptes
        </a>
        <a th:href="@{/accounts/{id}/statement(id=${account.id})}" class="btn btn-outline-primary btn-with-icon">
            <i class="bi bi-file-text" aria-hidden="true"></i> Relevé de compte
        </a>
        <a th:if="${account.status.name() == 'ACTIVE'}" th:href="@{/operations/deposit(accountId=${account.id})}"
           class="btn btn-primary btn-sm btn-with-icon">
            <i class="bi bi-plus-circle" aria-hidden="true"></i> Dépôt
        </a>
        <a th:if="${account.status.name() == 'ACTIVE'}" th:href="@{/operations/withdraw(accountId=${account.id})}"
           class="btn btn-warning btn-sm btn-with-icon">
            <i class="bi bi-dash-circle" aria-hidden="true"></i> Retrait
        </a>
        <a th:if="${canRequestCheckbook}" th:href="@{/checkbook-orders/new(accountId=${account.id})}"
           class="btn btn-outline-info btn-sm btn-with-icon">
            <i class="bi bi-journal-check" aria-hidden="true"></i> Commander un chéquier
        </a>

        <form th:if="${account.status.name() == 'ACTIVE'}"
              th:action="@{/accounts/{id}/block(id=${account.id})}" method="post" class="d-inline"
              data-confirm="Bloquer ce compte ? Les opérations seront suspendues.">
            <button type="submit" class="btn btn-danger btn-with-icon">
                <i class="bi bi-lock" aria-hidden="true"></i> Bloquer
            </button>
        </form>
        <form th:if="${account.status.name() == 'BLOCKED'}"
              th:action="@{/accounts/{id}/unblock(id=${account.id})}" method="post" class="d-inline"
              data-confirm="Débloquer ce compte et autoriser à nouveau les opérations ?">
            <button type="submit" class="btn btn-success btn-with-icon">
                <i class="bi bi-unlock" aria-hidden="true"></i> Débloquer
            </button>
        </form>
        <form th:if="${account.status.name() != 'CLOSED'}"
              th:action="@{/accounts/{id}/close(id=${account.id})}" method="post" class="d-inline"
              data-confirm="Clôturer définitivement ce compte ? Cette action est irréversible.">
            <button type="submit" class="btn btn-danger btn-with-icon">
                <i class="bi bi-x-circle" aria-hidden="true"></i> Clôturer
            </button>
        </form>
    </div>

    <div th:if="${!checkbookOrders.isEmpty()}" class="welcome-card mb-3">
        <h3 class="h5 mb-3">Commandes de chéquier</h3>
        <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
                <thead>
                <tr>
                    <th>N° commande</th>
                    <th>Date</th>
                    <th>Qté</th>
                    <th>Format</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${checkbookOrders}">
                    <td th:text="${order.orderNumber}">CHQ-00001</td>
                    <td th:text="${#temporals.format(order.requestedAt, 'dd/MM/yyyy')}">—</td>
                    <td th:text="${order.quantity}">1</td>
                    <td th:text="${order.sheetCount.label}">20 feuillets</td>
                    <td>
                        <span class="badge"
                              th:classappend="' text-bg-' + ${order.status.badgeClass}"
                              th:text="${order.status.label}">En attente</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/checkbook-orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary btn-with-icon">
                            <i class="bi bi-eye" aria-hidden="true"></i> Voir
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
