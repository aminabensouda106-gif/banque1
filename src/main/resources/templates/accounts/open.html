<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card mb-3">
        <p class="text-muted mb-3">
            Client : <strong th:text="${client.fullName}">Nom</strong>
            (<span th:text="${client.clientNumber}">CLI-00001</span>)
        </p>

        <form th:action="@{/accounts/client/{clientId}(clientId=${client.id})}"
              th:object="${openAccountForm}" method="post">
            <div class="mb-3">
                <label for="type" class="form-label">Type de compte *</label>
                <select id="type" class="form-select" th:field="*{type}"
                        th:classappend="${#fields.hasErrors('type')} ? ' is-invalid'">
                    <option value="">— Choisir —</option>
                    <option th:each="t : ${accountTypes}" th:value="${t.name()}" th:text="${t.label}">Type</option>
                </select>
                <div class="invalid-feedback" th:errors="*{type}"></div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Ouvrir le compte</button>
                <a th:href="@{/clients/{id}(id=${client.id})}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
