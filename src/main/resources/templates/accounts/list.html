<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card">
        <div th:if="${accounts.empty}" class="text-muted mb-3">Aucun compte ouvert.</div>
        <div th:unless="${accounts.empty}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>N° compte</th>
                    <th>Client</th>
                    <th>Type</th>
                    <th>Solde</th>
                    <th>Statut</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="account : ${accounts}">
                    <td th:text="${account.accountNumber}">ACC-00001</td>
                    <td>
                        <a th:href="@{/clients/{id}(id=${account.client.id})}"
                           th:text="${account.client.fullName}">Client</a>
                    </td>
                    <td th:text="${account.type.label}">Courant</td>
                    <td th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' MAD'">0,00 MAD</td>
                    <td>
                        <span class="badge"
                              th:classappend="' text-bg-' + ${account.status.badgeClass}"
                              th:text="${account.status.label}">Actif</span>
                    </td>
                    <td class="text-end">
                        <a th:href="@{/accounts/{id}(id=${account.id})}" class="btn btn-sm btn-outline-primary">Voir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${accounts.totalPages > 1}" class="mt-3">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${accounts.first} ? ' disabled'">
                    <a class="page-link" th:href="@{/accounts(page=${accounts.number - 1})}">Précédent</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link"
                          th:text="'Page ' + (${accounts.number} + 1) + ' / ' + ${accounts.totalPages}">Page</span>
                </li>
                <li class="page-item" th:classappend="${accounts.last} ? ' disabled'">
                    <a class="page-link" th:href="@{/accounts(page=${accounts.number + 1})}">Suivant</a>
                </li>
            </ul>
        </nav>
    </div>
</section>
</body>
</html>
