<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <nav th:replace="~{fragments/ui :: back(@{/accounts/{id}(id=${account.id})}, 'Retour au compte')}"></nav>
    <div class="welcome-card mb-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
            <div>
                <h2 class="h4 mb-1" th:text="'Relevé — ' + ${account.accountNumber}">Relevé</h2>
                <p class="text-muted mb-0">
                    Client :
                    <a th:href="@{/clients/{id}(id=${account.client.id})}"
                       th:text="${account.client.fullName}">Client</a>
                </p>
            </div>
            <div class="text-end">
                <div class="text-muted small">Solde courant</div>
                <strong class="fs-4"
                        th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' MAD'">0,00 MAD</strong>
            </div>
        </div>
    </div>

    <div class="toolbar-card mb-3">
        <form th:action="@{/accounts/{id}/statement(id=${account.id})}" method="get"
              th:object="${filter}" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label for="fromDate" class="form-label">Du</label>
                <input type="date" id="fromDate" class="form-control" th:field="*{fromDate}">
            </div>
            <div class="col-md-3">
                <label for="toDate" class="form-label">Au</label>
                <input type="date" id="toDate" class="form-control" th:field="*{toDate}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">Filtrer</button>
            </div>
        </form>
    </div>

    <div class="welcome-card">
        <div th:if="${transactions.empty}" class="text-muted">Aucune opération sur cette période.</div>
        <div th:unless="${transactions.empty}" class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Montant</th>
                    <th>Compte(s)</th>
                    <th>Agent</th>
                    <th>Description</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tx : ${transactions}">
                    <td th:text="${#temporals.format(tx.executedAt, 'dd/MM/yyyy HH:mm')}">—</td>
                    <td th:text="${tx.type.label}">Type</td>
                    <td th:text="${#numbers.formatDecimal(tx.amount, 1, 2)} + ' MAD'">0,00</td>
                    <td>
                        <span th:if="${tx.sourceAccount != null}" th:text="${tx.sourceAccount.accountNumber}">SRC</span>
                        <span th:if="${tx.type.name() == 'VIREMENT'}"> → </span>
                        <span th:if="${tx.destinationAccount != null}" th:text="${tx.destinationAccount.accountNumber}">DST</span>
                    </td>
                    <td th:text="${tx.executedBy.fullName}">Agent</td>
                    <td th:text="${tx.description != null ? tx.description : '—'}">—</td>
                    <td>
                        <a th:href="@{/transactions/{id}/receipt(id=${tx.id})}" class="btn btn-sm btn-outline-secondary btn-with-icon">
                            <i class="bi bi-receipt" aria-hidden="true"></i> Reçu
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${transactions.totalPages > 1}" class="mt-3">
            <ul class="pagination mb-0">
                <li class="page-item" th:classappend="${transactions.first} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/accounts/{id}/statement(id=${account.id}, page=${transactions.number - 1}, fromDate=${filter.fromDate}, toDate=${filter.toDate})}">Précédent</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link"
                          th:text="'Page ' + (${transactions.number} + 1) + ' / ' + ${transactions.totalPages}">Page</span>
                </li>
                <li class="page-item" th:classappend="${transactions.last} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/accounts/{id}/statement(id=${account.id}, page=${transactions.number + 1}, fromDate=${filter.fromDate}, toDate=${filter.toDate})}">Suivant</a>
                </li>
            </ul>
        </nav>
    </div>
</section>
</body>
</html>
