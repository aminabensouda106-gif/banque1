<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="toolbar-card d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <span class="text-muted" th:if="${unreadCount > 0}"
                  th:text="${unreadCount} + ' non lue(s)'">0 non lue(s)</span>
            <span class="text-muted" th:if="${unreadCount == 0}">Aucune notification non lue</span>
        </div>
        <form th:if="${unreadCount > 0}" th:action="@{/notifications/read-all}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-outline-primary btn-sm">Tout marquer comme lu</button>
        </form>
    </div>

    <div th:if="${notifications.isEmpty()}" class="welcome-card text-muted">
        Aucune notification pour le moment.
    </div>

    <div th:unless="${notifications.isEmpty()}" class="list-group notification-list">
        <div th:each="n : ${notifications.content}"
             class="list-group-item list-group-item-action notification-item"
             th:classappend="${!n.read} ? ' notification-unread' : ''">
            <div class="d-flex justify-content-between align-items-start gap-3">
                <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 mb-1">
                        <strong th:text="${n.title}">Titre</strong>
                        <span th:if="${!n.read}" class="badge bg-primary">Nouveau</span>
                    </div>
                    <p class="mb-1 text-muted" th:text="${n.message}">Message</p>
                    <small class="text-muted"
                           th:text="${#temporals.format(n.createdAt, 'dd/MM/yyyy HH:mm')}">Date</small>
                </div>
                <div class="d-flex flex-column gap-1">
                    <a th:if="${n.link != null}" th:href="@{${n.link}}" class="btn btn-sm btn-outline-secondary">Voir</a>
                    <form th:if="${!n.read}" th:action="@{/notifications/{id}/read(id=${n.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-primary">Marquer lue</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${notifications.totalPages > 1}" class="mt-3">
        <ul class="pagination">
            <li class="page-item" th:classappend="${notifications.first} ? ' disabled'">
                <a class="page-link" th:href="@{/notifications(page=${notifications.number - 1})}">Précédent</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link"
                      th:text="'Page ' + (${notifications.number} + 1) + ' / ' + ${notifications.totalPages}">Page</span>
            </li>
            <li class="page-item" th:classappend="${notifications.last} ? ' disabled'">
                <a class="page-link" th:href="@{/notifications(page=${notifications.number + 1})}">Suivant</a>
            </li>
        </ul>
    </nav>
</section>
</body>
</html>
