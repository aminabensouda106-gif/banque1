<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card mb-3">
        <p class="text-muted mb-0">
            Définir un nouveau mot de passe pour
            <strong th:text="${user.fullName} + ' (' + ${user.username} + ')'">Utilisateur</strong>.
        </p>
    </div>

    <div class="welcome-card">
        <form th:action="@{/admin/users/{id}/password(id=${user.id})}" th:object="${passwordForm}" method="post" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="password" class="form-label">Nouveau mot de passe *</label>
                    <input type="password" id="password" class="form-control" th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'">
                    <div class="invalid-feedback" th:errors="*{password}"></div>
                </div>
                <div class="col-md-6">
                    <label for="confirmPassword" class="form-label">Confirmation *</label>
                    <input type="password" id="confirmPassword" class="form-control" th:field="*{confirmPassword}"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'">
                    <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Enregistrer le mot de passe</button>
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
