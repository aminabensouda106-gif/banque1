<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card mb-3">
        <p class="text-muted mb-0">
            Identifiant : <strong th:text="${user.username}">agent</strong>
        </p>
    </div>

    <div class="welcome-card">
        <form th:action="@{/admin/users/{id}(id=${user.id})}" th:object="${userEditForm}" method="post" novalidate>
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="fullName" class="form-label">Nom complet *</label>
                    <input type="text" id="fullName" class="form-control" th:field="*{fullName}"
                           th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'">
                    <div class="invalid-feedback" th:errors="*{fullName}"></div>
                </div>
                <div class="col-md-6">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="col-md-6">
                    <label for="role" class="form-label">Rôle *</label>
                    <select id="role" class="form-select" th:field="*{role}"
                            th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'">
                        <option th:each="r : ${userRoles}" th:value="${r.name()}" th:text="${r.label}">Rôle</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{role}"></div>
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
