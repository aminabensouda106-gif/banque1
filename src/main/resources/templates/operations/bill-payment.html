<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <nav th:replace="~{fragments/ui :: back(@{/operations}, 'Opérations')}"></nav>
    <div class="welcome-card">
        <form th:action="@{/operations/bill-payment}" th:object="${billPaymentForm}" method="post"
              data-confirm="Confirmer le paiement de cette facture ?">
            <div class="mb-3">
                <label for="accountId" class="form-label">Compte *</label>
                <select id="accountId" class="form-select" th:field="*{accountId}"
                        th:classappend="${#fields.hasErrors('accountId')} ? ' is-invalid'">
                    <option value="">— Choisir un compte —</option>
                    <option th:each="a : ${activeAccounts}" th:value="${a.id}"
                            th:text="${a.accountNumber + ' — ' + a.client.fullName + ' (' + #numbers.formatDecimal(a.balance, 1, 2) + ' MAD)'}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{accountId}"></div>
            </div>
            <div class="mb-3">
                <label for="providerId" class="form-label">Facturier *</label>
                <select id="providerId" class="form-select" th:field="*{providerId}"
                        th:classappend="${#fields.hasErrors('providerId')} ? ' is-invalid'">
                    <option value="">— Choisir un facturier —</option>
                    <option th:each="p : ${activeProviders}" th:value="${p.id}"
                            th:text="${p.name + (p.category != null ? ' (' + p.category + ')' : '')}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{providerId}"></div>
            </div>
            <div class="mb-3">
                <label for="clientReference" class="form-label">Référence client / contrat *</label>
                <input type="text" id="clientReference" class="form-control" th:field="*{clientReference}"
                       maxlength="50" placeholder="Ex. numéro de contrat ou de facture"
                       th:classappend="${#fields.hasErrors('clientReference')} ? ' is-invalid'">
                <div class="invalid-feedback" th:errors="*{clientReference}"></div>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Montant (MAD) *</label>
                <input type="number" step="0.01" min="0.01" max="999999999999999.9999" id="amount" class="form-control"
                       th:field="*{amount}" th:classappend="${#fields.hasErrors('amount')} ? ' is-invalid'">
                <div class="form-text">Utilisez un point pour les décimales (ex. 150 ou 150.50).</div>
                <div class="invalid-feedback" th:errors="*{amount}"></div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-info text-white btn-with-icon">
                    <i class="bi bi-check-lg" aria-hidden="true"></i>
                    <span th:text="${submitLabel}">Valider</span>
                </button>
                <a th:href="@{/operations}" class="btn btn-outline-secondary btn-with-icon">
                    <i class="bi bi-x-lg" aria-hidden="true"></i> Annuler
                </a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
