<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <nav th:replace="~{fragments/ui :: back(@{/operations}, 'Opérations')}"></nav>
    <div class="welcome-card">
        <form th:action="@{/operations/withdraw}" th:object="${operationForm}" method="post"
              data-confirm="Confirmer le retrait sur le compte sélectionné ?">
            <div class="mb-3">
                <label for="accountId" class="form-label">Compte *</label>
                <select id="accountId" class="form-select" th:field="*{accountId}"
                        th:classappend="${#fields.hasErrors('accountId')} ? ' is-invalid'">
                    <option value="">— Choisir un compte —</option>
                    <option th:each="a : ${activeAccounts}" th:value="${a.id}"
                            th:text="${a.accountNumber + ' — ' + a.client.fullName + ' (' + #numbers.formatDecimal(a.balance, 1, 2) + ' MAD)'}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{accountId}"></div>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Montant (MAD) *</label>
                <input type="number" step="0.01" min="0.01" max="999999999999999.9999" id="amount" class="form-control"
                       th:field="*{amount}" th:classappend="${#fields.hasErrors('amount')} ? ' is-invalid'">
                <div class="form-text">Utilisez un point pour les décimales (ex. 1000 ou 1000.50).</div>
                <div class="invalid-feedback" th:errors="*{amount}"></div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input type="text" id="description" class="form-control" th:field="*{description}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-warning btn-with-icon">
                    <i class="bi bi-check-lg" aria-hidden="true"></i>
                    <span th:text="${submitLabel}">Valider</span>
                </button>
                <a th:href="@{/operations}" class="btn btn-outline-secondary btn-with-icon">
                    <i class="bi bi-x-lg" aria-hidden="true"></i> Annuler
                </a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
