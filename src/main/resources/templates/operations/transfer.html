<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: layout(${pageTitle}, ~{::section})}">
<body>
<section th:fragment="section">
    <div class="welcome-card">
        <form th:action="@{/operations/transfer}" th:object="${transferForm}" method="post">
            <div class="mb-3">
                <label for="sourceAccountId" class="form-label">Compte source *</label>
                <select id="sourceAccountId" class="form-select" th:field="*{sourceAccountId}"
                        th:classappend="${#fields.hasErrors('sourceAccountId')} ? ' is-invalid'">
                    <option value="">— Choisir —</option>
                    <option th:each="a : ${activeAccounts}" th:value="${a.id}"
                            th:text="${a.accountNumber + ' — ' + a.client.fullName + ' (' + #numbers.formatDecimal(a.balance, 1, 2) + ' MAD)'}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{sourceAccountId}"></div>
            </div>
            <div class="mb-3">
                <label for="destinationAccountId" class="form-label">Compte destination *</label>
                <select id="destinationAccountId" class="form-select" th:field="*{destinationAccountId}"
                        th:classappend="${#fields.hasErrors('destinationAccountId')} ? ' is-invalid'">
                    <option value="">— Choisir —</option>
                    <option th:each="a : ${activeAccounts}" th:value="${a.id}"
                            th:text="${a.accountNumber + ' — ' + a.client.fullName + ' (' + #numbers.formatDecimal(a.balance, 1, 2) + ' MAD)'}">
                    </option>
                </select>
                <div class="invalid-feedback" th:errors="*{destinationAccountId}"></div>
            </div>
            <div class="mb-3">
                <label for="amount" class="form-label">Montant (MAD) *</label>
                <input type="number" step="0.01" min="0.01" max="999999999999999.9999" id="amount" class="form-control"
                       th:field="*{amount}" th:classappend="${#fields.hasErrors('amount')} ? ' is-invalid'">
                <div class="form-text">Utilisez un point pour les décimales (ex. 1000 ou 1000.50).</div>
                <div class="invalid-feedback" th:errors="*{amount}"></div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <input type="text" id="description" class="form-control" th:field="*{description}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success" th:text="${submitLabel}">Valider</button>
                <a th:href="@{/operations}" class="btn btn-outline-secondary">Annuler</a>
            </div>
        </form>
    </div>
</section>
</body>
</html>
