<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Banque Agence'">Banque Agence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">BA</span>
            <span class="brand-text">Banque Agence</span>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? ' active'">
                Tableau de bord
            </a>
            <a th:href="@{/clients}" class="sidebar-link" th:classappend="${activePage == 'clients'} ? ' active'">
                Clients
            </a>
            <a th:href="@{/accounts}" class="sidebar-link" th:classappend="${activePage == 'accounts'} ? ' active'">
                Comptes
            </a>
            <a th:href="@{/operations}" class="sidebar-link" th:classappend="${activePage == 'operations'} ? ' active'">
                Opérations
            </a>
            <a th:href="@{/transactions}" class="sidebar-link" th:classappend="${activePage == 'transactions'} ? ' active'">
                Historique
            </a>
            <a th:href="@{/checkbook-orders}" class="sidebar-link" th:classappend="${activePage == 'checkbook-orders'} ? ' active'">
                Chéquiers
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}"
               class="sidebar-link" th:classappend="${activePage == 'users'} ? ' active'">
                Utilisateurs
            </a>
            <a sec:authorize="hasAnyRole('ADMIN', 'CHEF_AGENCE')" th:href="@{/admin/audit}"
               class="sidebar-link" th:classappend="${activePage == 'audit'} ? ' active'">
                Journal d'audit
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <strong sec:authentication="principal.user.fullName">Utilisateur</strong>
                <small sec:authentication="principal.user.role.label">Rôle</small>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">Déconnexion</button>
            </form>
        </div>
    </aside>
    <div class="app-main">
        <header class="app-header d-flex justify-content-between align-items-center">
            <h1 th:text="${title}">Page</h1>
            <a th:href="@{/notifications}" class="notification-bell" title="Notifications">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2M8 1.918l-.797.161A4.002 4.002 0 0 0 4 6c0 .628-.134 1.197-.393 1.744-.17.343-.341.686-.512 1.03-.066.133-.099.266-.099.4v.1c0 .563.437 1 1 1h9c.563 0 1-.437 1-1v-.1c0-.134-.033-.267-.099-.4-.171-.344-.342-.687-.512-1.03C13.197 7.197 13 6.628 13 6a4.002 4.002 0 0 0-4.803-3.92zM9 0H7a5 5 0 0 0-5 5v.1c0 .563-.187 1.123-.533 1.57-.346.447-.8.83-1.267 1.13A1 1 0 0 0 1 9h14a1 1 0 0 0 .8-1.6c-.467-.3-.92-.683-1.267-1.13A3.98 3.98 0 0 1 13 5.1V5a5 5 0 0 0-4-4.9z"/>
                </svg>
                <span th:if="${unreadNotificationCount > 0}" class="notification-badge"
                      th:text="${unreadNotificationCount > 9} ? '9+' : ${unreadNotificationCount}">0</span>
            </a>
        </header>
        <main class="app-content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:replace="${content}">Contenu</div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
