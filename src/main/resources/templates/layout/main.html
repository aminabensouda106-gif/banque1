<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' — Banque Agence'">Banque Agence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-body">
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">BA</span>
            <span class="brand-text">Banque Agence</span>
        </div>
        <nav class="sidebar-nav">
            <a th:href="@{/dashboard}" class="sidebar-link" th:classappend="${activePage == 'dashboard'} ? ' active'">
                <i class="bi bi-speedometer2" aria-hidden="true"></i>
                <span>Tableau de bord</span>
            </a>
            <a th:href="@{/clients}" class="sidebar-link" th:classappend="${activePage == 'clients'} ? ' active'">
                <i class="bi bi-people" aria-hidden="true"></i>
                <span>Clients</span>
            </a>
            <a th:href="@{/accounts}" class="sidebar-link" th:classappend="${activePage == 'accounts'} ? ' active'">
                <i class="bi bi-wallet2" aria-hidden="true"></i>
                <span>Comptes</span>
            </a>
            <a th:href="@{/operations}" class="sidebar-link" th:classappend="${activePage == 'operations'} ? ' active'">
                <i class="bi bi-cash-stack" aria-hidden="true"></i>
                <span>Opérations</span>
            </a>
            <a th:href="@{/transactions}" class="sidebar-link" th:classappend="${activePage == 'transactions'} ? ' active'">
                <i class="bi bi-clock-history" aria-hidden="true"></i>
                <span>Historique</span>
            </a>
            <a th:href="@{/checkbook-orders}" class="sidebar-link" th:classappend="${activePage == 'checkbook-orders'} ? ' active'">
                <i class="bi bi-journal-check" aria-hidden="true"></i>
                <span>Chéquiers</span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/users}"
               class="sidebar-link" th:classappend="${activePage == 'users'} ? ' active'">
                <i class="bi bi-person-gear" aria-hidden="true"></i>
                <span>Utilisateurs</span>
            </a>
            <a sec:authorize="hasAnyRole('ADMIN', 'CHEF_AGENCE')" th:href="@{/admin/audit}"
               class="sidebar-link" th:classappend="${activePage == 'audit'} ? ' active'">
                <i class="bi bi-shield-check" aria-hidden="true"></i>
                <span>Journal d'audit</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="bi bi-person-circle sidebar-user-icon" aria-hidden="true"></i>
                <div>
                    <strong sec:authentication="principal.user.fullName">Utilisateur</strong>
                    <small sec:authentication="principal.user.role.label">Rôle</small>
                </div>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">
                    <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                    Déconnexion
                </button>
            </form>
        </div>
    </aside>
    <div class="app-main">
        <header class="app-header d-flex justify-content-between align-items-center">
            <h1 th:text="${title}">Page</h1>
            <a th:href="@{/notifications}" class="notification-bell" title="Notifications">
                <i class="bi bi-bell" aria-hidden="true"></i>
                <span th:if="${unreadNotificationCount > 0}" class="notification-badge"
                      th:text="${unreadNotificationCount > 9} ? '9+' : ${unreadNotificationCount}">0</span>
            </a>
        </header>
        <main class="app-content">
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div th:replace="${content}">Contenu</div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
