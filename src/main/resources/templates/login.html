<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — AmanaBank</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img th:src="@{/images/amana-logo.png}" src="/images/amana-logo.png"
                 alt="AmanaBank" class="brand-logo" width="200" height="52">
            <p class="login-tagline">Connexion personnel ou espace client</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Identifiant</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person" aria-hidden="true"></i></span>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Utilisateur, CIN ou n° client" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock" aria-hidden="true"></i></span>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
                Se connecter
            </button>
        </form>

        <div class="login-hint-grid">
            <div class="login-hint-box">
                <strong><i class="bi bi-building" aria-hidden="true"></i> Personnel</strong><br>
                admin, agent, chef
            </div>
            <div class="login-hint-box portal-hint">
                <strong><i class="bi bi-phone" aria-hidden="true"></i> Espace client</strong><br>
                CIN ou n° client + mot de passe<br>
                Démo : <code>CD789012</code> / <code>client123</code>
            </div>
        </div>
    </div>
</div>
</body>
</html>
